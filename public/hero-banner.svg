<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 460" width="1600" height="460" role="img" aria-label="The MASTER Prompt Library, 427 prompts engineered to actually work">
  <title>The MASTER Prompt Library</title>
  <desc>A 9-layer framework for prompt engineering. 427 prompts. Built by nifty.</desc>

  <defs>
    <linearGradient id="hbBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#16161a"/>
    </linearGradient>
    <radialGradient id="hbGlow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#e8ff47" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#e8ff47" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#e8ff47" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hbAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8ff47"/>
      <stop offset="100%" stop-color="#c8df27"/>
    </linearGradient>
    <pattern id="hbGrid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#26262e" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1600" height="460" fill="url(#hbBg)"/>
  <rect width="1600" height="460" fill="url(#hbGrid)"/>
  <rect width="1600" height="460" fill="url(#hbGlow)"/>

  <rect x="0" y="0" width="1600" height="2" fill="url(#hbAccent)" opacity="0.7"/>

  <g transform="translate(80, 60)">
    <rect width="48" height="48" rx="9" fill="#e8ff47"/>
    <text x="24" y="36" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700" fill="#0a0a0c" text-anchor="middle">M</text>
  </g>
  <text x="142" y="92" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#e8e8ee">Prompt Library</text>
  <text x="142" y="111" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#8b8b95">9-LAYER MASTER FRAMEWORK</text>

  <text x="80" y="220" font-family="Inter, sans-serif" font-size="58" font-weight="800" fill="#e8e8ee" letter-spacing="-1.5">Prompts engineered to</text>
  <text x="80" y="290" font-family="Inter, sans-serif" font-size="58" font-weight="800" letter-spacing="-1.5">
    <tspan fill="url(#hbAccent)">actually work</tspan><tspan fill="#e8e8ee">.</tspan>
  </text>

  <g transform="translate(80, 360)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="38" font-weight="700" fill="#e8e8ee">427</text>
    <text x="0" y="28" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#8b8b95">PROMPTS</text>

    <text x="160" y="0" font-family="JetBrains Mono, monospace" font-size="38" font-weight="700" fill="#e8e8ee">18</text>
    <text x="160" y="28" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#8b8b95">CATEGORIES</text>

    <text x="290" y="0" font-family="JetBrains Mono, monospace" font-size="38" font-weight="700" fill="#e8e8ee">156</text>
    <text x="290" y="28" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#8b8b95">FULL MASTER</text>

    <text x="450" y="0" font-family="JetBrains Mono, monospace" font-size="38" font-weight="700" fill="#e8e8ee">55</text>
    <text x="450" y="28" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#8b8b95">EXERCISES</text>
  </g>

  <g transform="translate(1040, 130)">
    <g transform="translate(0, 0)">
      <rect width="80" height="80" rx="10" fill="#1a1a1f" stroke="#e8ff47" stroke-width="1.5" stroke-opacity="0.5"/>
      <text x="40" y="56" font-family="JetBrains Mono, monospace" font-size="44" font-weight="800" fill="#e8ff47" text-anchor="middle">M</text>
      <text x="40" y="98" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#8b8b95" text-anchor="middle">MISSION</text>
    </g>
    <g transform="translate(95, 0)">
      <rect width="80" height="80" rx="10" fill="#1a1a1f" stroke="#26262e" stroke-width="1"/>
      <text x="40" y="56" font-family="JetBrains Mono, monospace" font-size="44" font-weight="800" fill="#e8e8ee" text-anchor="middle">A</text>
      <text x="40" y="98" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#8b8b95" text-anchor="middle">AGENT</text>
    </g>
    <g transform="translate(190, 0)">
      <rect width="80" height="80" rx="10" fill="#1a1a1f" stroke="#26262e" stroke-width="1"/>
      <text x="40" y="56" font-family="JetBrains Mono, monospace" font-size="44" font-weight="800" fill="#e8e8ee" text-anchor="middle">S</text>
      <text x="40" y="98" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#8b8b95" text-anchor="middle">SITUATION</text>
    </g>
    <g transform="translate(285, 0)">
      <rect width="80" height="80" rx="10" fill="#1a1a1f" stroke="#26262e" stroke-width="1"/>
      <text x="40" y="56" font-family="JetBrains Mono, monospace" font-size="44" font-weight="800" fill="#e8e8ee" text-anchor="middle">T</text>
      <text x="40" y="98" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#8b8b95" text-anchor="middle">TASK</text>
    </g>
    <g transform="translate(380, 0)">
      <rect width="80" height="80" rx="10" fill="#1a1a1f" stroke="#26262e" stroke-width="1"/>
      <text x="40" y="56" font-family="JetBrains Mono, monospace" font-size="44" font-weight="800" fill="#e8e8ee" text-anchor="middle">E</text>
      <text x="40" y="98" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#8b8b95" text-anchor="middle">EXAMPLES</text>
    </g>
    <g transform="translate(0, 130)">
      <rect width="80" height="80" rx="10" fill="#1a1a1f" stroke="#26262e" stroke-width="1"/>
      <text x="40" y="56" font-family="JetBrains Mono, monospace" font-size="44" font-weight="800" fill="#e8e8ee" text-anchor="middle">R</text>
      <text x="40" y="98" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#8b8b95" text-anchor="middle">RULES</text>
    </g>
    <g transform="translate(95, 130)">
      <rect width="80" height="80" rx="10" fill="#1a1a1f" stroke="#26262e" stroke-width="1"/>
      <text x="40" y="56" font-family="JetBrains Mono, monospace" font-size="36" font-weight="800" fill="#e8e8ee" text-anchor="middle">+</text>
      <text x="40" y="98" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#8b8b95" text-anchor="middle">THINK</text>
    </g>
    <g transform="translate(190, 130)">
      <rect width="80" height="80" rx="10" fill="#1a1a1f" stroke="#26262e" stroke-width="1"/>
      <text x="40" y="56" font-family="JetBrains Mono, monospace" font-size="36" font-weight="800" fill="#e8e8ee" text-anchor="middle">+</text>
      <text x="40" y="98" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#8b8b95" text-anchor="middle">EVAL</text>
    </g>
    <g transform="translate(285, 130)">
      <rect width="80" height="80" rx="10" fill="#1a1a1f" stroke="#26262e" stroke-width="1"/>
      <text x="40" y="56" font-family="JetBrains Mono, monospace" font-size="36" font-weight="800" fill="#e8e8ee" text-anchor="middle">+</text>
      <text x="40" y="98" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.5" fill="#8b8b95" text-anchor="middle">OUTPUT</text>
    </g>
  </g>

  <rect x="0" y="458" width="1600" height="2" fill="url(#hbAccent)" opacity="0.4"/>
</svg>
