<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#16161a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#e8ff47" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#e8ff47" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#e8ff47" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8ff47"/>
      <stop offset="100%" stop-color="#c8df27"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#26262e" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.7"/>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="10" fill="#e8ff47"/>
    <text x="28" y="42" font-family="JetBrains Mono, monospace" font-size="34" font-weight="700" fill="#0a0a0c" text-anchor="middle">M</text>
  </g>
  <text x="160" y="120" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#e8e8ee">Prompt Library</text>

  <!-- Eyebrow -->
  <text x="80" y="240" font-family="JetBrains Mono, monospace" font-size="20" letter-spacing="3" fill="#e8ff47" font-weight="500">THE 9-LAYER MASTER FRAMEWORK</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#e8e8ee" letter-spacing="-2">Prompts engineered to</text>
  <text x="80" y="402" font-family="Inter, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#accent)">actually work</tspan><tspan fill="#e8e8ee">.</tspan>
  </text>

  <!-- Stats strip -->
  <g transform="translate(80, 480)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="50" font-weight="700" fill="#e8e8ee">427</text>
    <text x="0" y="36" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2" fill="#8b8b95">PROMPTS</text>

    <text x="220" y="0" font-family="JetBrains Mono, monospace" font-size="50" font-weight="700" fill="#e8e8ee">18</text>
    <text x="220" y="36" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2" fill="#8b8b95">CATEGORIES</text>

    <text x="400" y="0" font-family="JetBrains Mono, monospace" font-size="50" font-weight="700" fill="#e8e8ee">9</text>
    <text x="400" y="36" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2" fill="#8b8b95">MASTER LAYERS</text>

    <text x="600" y="0" font-family="JetBrains Mono, monospace" font-size="50" font-weight="700" fill="#e8e8ee">16</text>
    <text x="600" y="36" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2" fill="#8b8b95">CHAPTERS</text>
  </g>

  <!-- Right side: MASTER acronym vertical badges -->
  <g transform="translate(900, 200)" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">
    <g>
      <rect x="0" y="0" width="56" height="56" rx="8" fill="#16161a" stroke="#26262e"/>
      <text x="28" y="40" fill="#e8ff47" text-anchor="middle">M</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="0" y="0" width="56" height="56" rx="8" fill="#16161a" stroke="#26262e"/>
      <text x="28" y="40" fill="#e8ff47" text-anchor="middle">A</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="56" height="56" rx="8" fill="#16161a" stroke="#26262e"/>
      <text x="28" y="40" fill="#e8ff47" text-anchor="middle">S</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="56" height="56" rx="8" fill="#16161a" stroke="#26262e"/>
      <text x="28" y="40" fill="#e8ff47" text-anchor="middle">T</text>
    </g>
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="56" height="56" rx="8" fill="#16161a" stroke="#26262e"/>
      <text x="28" y="40" fill="#e8ff47" text-anchor="middle">E</text>
    </g>
    <g transform="translate(60, 60)">
      <rect x="0" y="0" width="56" height="56" rx="8" fill="#16161a" stroke="#26262e"/>
      <text x="28" y="40" fill="#e8ff47" text-anchor="middle">R</text>
    </g>
    <g transform="translate(120, 60)">
      <rect x="0" y="0" width="56" height="56" rx="8" fill="#16161a" stroke="#26262e"/>
      <text x="28" y="40" fill="#e8ff47" text-anchor="middle">+</text>
    </g>
    <g transform="translate(180, 60)">
      <rect x="0" y="0" width="56" height="56" rx="8" fill="#16161a" stroke="#26262e"/>
      <text x="28" y="40" fill="#e8ff47" text-anchor="middle">+</text>
    </g>
    <g transform="translate(120, 120)">
      <rect x="0" y="0" width="56" height="56" rx="8" fill="#16161a" stroke="#26262e"/>
      <text x="28" y="40" fill="#e8ff47" text-anchor="middle">+</text>
    </g>
  </g>

  <!-- URL footer -->
  <text x="80" y="585" font-family="JetBrains Mono, monospace" font-size="16" fill="#5b5b65">IgorCSIS.github.io/prompt-library</text>
</svg>
